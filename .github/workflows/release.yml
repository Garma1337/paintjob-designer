name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Extract version from pyproject.toml
        id: version
        run: |
          version=$(python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ steps.version.outputs.version }} already exists. Bump the version in pyproject.toml first."
            exit 1
          fi

  test:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Qt system dependencies
        # PySide6's QtGui/QtWidgets dynamically loads libEGL even when the
        # tests only construct widgets headless via QT_QPA_PLATFORM=offscreen.
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libdbus-1-3

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/

  build-portable-windows:
    needs: [version, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller PaintjobDesigner.spec

      - name: Compress output
        shell: bash
        run: cd dist && 7z a -t7z -mx=9 ../PaintjobDesigner-windows-portable.7z PaintjobDesigner/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaintjobDesigner-windows-portable
          path: PaintjobDesigner-windows-portable.7z

  build-source:
    needs: [version, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Stage source tree
        run: |
          mkdir -p stage/PaintjobDesigner
          cp -r main.py paintjob_designer config app.ico requirements.txt README.md stage/PaintjobDesigner/
          cp launcher/run.bat launcher/run.sh stage/PaintjobDesigner/
          chmod +x stage/PaintjobDesigner/run.sh

      - name: Package Windows source 7z
        run: |
          rm stage/PaintjobDesigner/run.sh
          cd stage && 7z a -t7z -mx=9 ../PaintjobDesigner-windows-source.7z PaintjobDesigner

      - name: Restore run.sh for Linux package
        run: |
          cp launcher/run.sh stage/PaintjobDesigner/run.sh
          chmod +x stage/PaintjobDesigner/run.sh
          rm stage/PaintjobDesigner/run.bat

      - name: Package Linux source 7z
        run: |
          cd stage && 7z a -t7z -mx=9 ../PaintjobDesigner-linux-source.7z PaintjobDesigner

      - name: Upload Windows source artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaintjobDesigner-windows-source
          path: PaintjobDesigner-windows-source.7z

      - name: Upload Linux source artifact
        uses: actions/upload-artifact@v4
        with:
          name: PaintjobDesigner-linux-source
          path: PaintjobDesigner-linux-source.7z

  release:
    needs: [version, build-portable-windows, build-source]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/PaintjobDesigner-windows-portable/PaintjobDesigner-windows-portable.7z release/
          cp artifacts/PaintjobDesigner-windows-source/PaintjobDesigner-windows-source.7z release/
          cp artifacts/PaintjobDesigner-linux-source/PaintjobDesigner-linux-source.7z release/

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.version.outputs.version }}"
          git push origin "v${{ needs.version.outputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: Paintjob Designer v${{ needs.version.outputs.version }}
          generate_release_notes: true
          files: |
            release/PaintjobDesigner-windows-portable.7z
            release/PaintjobDesigner-windows-source.7z
            release/PaintjobDesigner-linux-source.7z
